spring:
  application:
    name: hub

  datasource:
    # Surchargeable par variables d'environnement (cf. docker-compose.yml).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hub}
    username: ${DB_USERNAME:hub}
    password: ${DB_PASSWORD:hub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' convient au developpement ; une vraie mise en production
      # passerait par des migrations versionnees (Flyway/Liquibase).
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: 8080

# Parametres du jeton JWT. Le secret DOIT etre surcharge en production par la variable
# d'environnement JWT_SECRET : la valeur par defaut n'existe que pour le developpement
# local et ne doit jamais proteger de vraies donnees. Il doit faire au moins 256 bits
# (32 caracteres) pour l'algorithme HS256.
hub:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-0123456789-abcdefghijklmnop}
    # Duree de validite du jeton, en millisecondes (ici 24 heures).
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.epitech.hub: DEBUG
